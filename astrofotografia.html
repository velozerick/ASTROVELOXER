    <script>
document.addEventListener("DOMContentLoaded", function() {
    const liItems = document.querySelectorAll('ul.galeria li');
    const imgItems = document.querySelectorAll('.product img');
    const imgContainers = document.querySelectorAll('.imgc');

    liItems.forEach(li => {
        li.addEventListener("click", function() {
            const filter = this.textContent.toLowerCase();
            
           
            imgItems.forEach(img => {
                if (filter === "todo" || img.getAttribute('data-filter') === filter) {
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }
            });
        });
    });

    imgContainers.forEach(container => {
        const img = container.querySelector('img');
        const overlay = container.querySelector('.overlay');

        container.addEventListener("click", function() {
            img.classList.toggle("enlarged");
            overlay.classList.toggle("show-text");
        });
    });
});



        </script>
